name: flight_reliability_intelligence
version: "1.0.0"
config-version: 2

profile: flight_reliability_intelligence

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  flight_reliability_intelligence:
    staging:
      +materialized: view
      +tags: ["staging"]
    marts:
      +materialized: table
      +tags: ["dashboard", "reliability"]

vars:
  minimum_route_flights: 100
